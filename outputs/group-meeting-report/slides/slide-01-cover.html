<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  /* Slide dimensions: 720pt × 405pt (16:9) */
  body { margin: 0; padding: 0; }
  .slide {
    width: 720pt;
    height: 405pt;
    background: linear-gradient(135deg, #1C2833 0%, #2E4053 50%, #1C2833 100%);
    position: relative;
    overflow: hidden;
    font-family: "Microsoft YaHei", "PingFang SC", "SimHei", sans-serif;
    color: #F4F6F6;
  }
  /* Decorative geometric elements */
  .slide::before {
    content: '';
    position: absolute;
    top: -100pt;
    right: -100pt;
    width: 400pt;
    height: 400pt;
    border-radius: 50%;
    background: rgba(74, 144, 217, 0.08);
  }
  .slide::after {
    content: '';
    position: absolute;
    bottom: -60pt;
    left: -60pt;
    width: 300pt;
    height: 300pt;
    border-radius: 50%;
    background: rgba(74, 144, 217, 0.06);
  }
  .content {
    position: relative;
    z-index: 1;
    padding: 60pt 50pt;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .main-title {
    font-size: 36pt;
    font-weight: bold;
    color: #FFFFFF;
    margin-bottom: 12pt;
    letter-spacing: 2pt;
    line-height: 1.3;
  }
  .divider {
    width: 120pt;
    height: 3pt;
    background: #4A90D9;
    margin: 16pt auto;
  }
  .subtitle {
    font-size: 18pt;
    color: #AAB7B8;
    margin-bottom: 30pt;
    font-weight: normal;
  }
  .meta {
    font-size: 14pt;
    color: #8A9BA8;
    letter-spacing: 1pt;
  }
  .meta strong {
    color: #4A90D9;
    font-weight: normal;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="content">
    <div class="main-title">基于多模态学习分析的<br/>课题推进与系统研发汇报</div>
    <div class="divider"></div>
    <div class="subtitle">本周工作总结与下步计划</div>
    <div class="meta">
      汇报人：<strong>尹家乐</strong> &nbsp;&nbsp;|&nbsp;&nbsp; 时间：<strong>2026年7月15日</strong>
    </div>
  </div>
</div>
</body>
</html>
